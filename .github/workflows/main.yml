name: Compilar Rescue AI Mobile

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Esto te añade un botón para compilar manualmente cuando quieras

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar tus archivos planos
    - name: Descargar el código
      uses: actions/checkout@v4

    # 2. Configurar Java (necesario para tu compilación versión 34)
    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # 3. Instalar Gradle en la nube (por si no subiste el archivo gradlew)
    - name: Configurar el motor de Gradle
      uses: gradle/actions/setup-gradle@v3

    # 4. Truco de magia para apps ultra-planas: crear un archivo de configuración si falta
    - name: Crear configuración base si no existe
      run: |
        if [ ! -f settings.gradle ]; then
          echo "rootProject.name = 'RescueAIMobile'" > settings.gradle
        fi

    # 5. Ordenar la construcción del APK usando el motor instalado
    - name: Construir el APK
      run: gradle assembleDebug

    # 6. Buscar y guardar el APK en la raíz del proyecto (sin buscar la carpeta 'app')
    - name: Guardar APK resultante
      uses: actions/upload-artifact@v4
      with:
        name: RescueAI_Instalable
        path: build/outputs/apk/debug/*.apk
        
